version: v2
inputs:
  - directory: .
plugins:
  # Go: protobuf + gRPC + Connect
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.6.1
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go:v1.19.1
    out: gen/go
    opt:
      - paths=source_relative
  # TypeScript: protobuf-es v2
  - remote: buf.build/bufbuild/es:v2.11.0
    out: gen/typescript
